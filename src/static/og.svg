<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <!-- Square canvas so qlmanage renders 1:1; the design sits in the centre
       1200x630 band (y 285..915) and is cropped to that band afterwards. -->
  <rect width="1200" height="1200" fill="#f2eee3"/>
  <rect x="0" y="285" width="1200" height="12" fill="#161410"/>
  <rect x="0" y="903" width="1200" height="12" fill="#161410"/>

  <text x="80" y="405"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="26" letter-spacing="4" fill="#6b655a">// AI-SLOP MONITOR  ·  STATUS: <tspan fill="#d62828" font-weight="700">BLAMING</tspan></text>

  <text x="74" y="635"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="124" letter-spacing="-5"
        fill="#161410">AISLOPWATCH<tspan fill="#d62828">█</tspan></text>

  <rect x="80" y="672" width="120" height="10" fill="#d62828"/>

  <text x="80" y="755"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="42" fill="#44403a">Screenshots of the internet's worst AI slop.</text>

  <text x="80" y="855"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
